# Make AbstractHorse.setFlag accessible so the client-side preview entity can set
# the saddle flag bit (DATA_ID_FLAGS bit 4) after loading from NBT. The flag lives
# in SynchedEntityData and is normally only set on the server side by
# updateContainerEquipment — but our preview entity never joins a server-synced
# world, so we have to push the bit ourselves for the saddle to render.
public net.minecraft.world.entity.animal.horse.AbstractHorse setFlag(IZ)V
